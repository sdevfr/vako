name: Publish to npm

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  id-token: write # required for npm provenance

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registery-url: "https://registry.npmjs.org"
          cache: npm
      - name: Extract version from tag
        id: v
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Verify version matches package.json
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${{ steps.v.outputs.version }}"
          [ "$PKG" = "$TAG" ] || { echo "mismatch pkg=$PKG tag=$TAG"; exit 1; }
      - run: npm ci
      - run: npm run lint:check
      - run: npm test
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Github Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.v.outputs.version }}
          generate_release_notes: true
          body: |
            ## v${{ steps.v.outputs.version }}
            Published from Github Actions.
            ### Install
            ```bash
            npm install vako@${{ steps.v.outputs.version }}
            ```
            ### Links
            - [npm](https://www.npmjs.org/package/vako)
            - [repo](${{ github.server_url }}/${{ github.repository }})
